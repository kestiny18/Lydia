name: Release CLI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Publish workspace packages
        shell: bash
        run: |
          publish_if_needed() {
            local dir="$1"
            local pkg
            local version
            pkg=$(node -p "require('./${dir}/package.json').name")
            version=$(node -p "require('./${dir}/package.json').version")

            if npm view "${pkg}@${version}" version >/dev/null 2>&1; then
              echo "Skipping ${pkg}@${version}: already published"
              return 0
            fi

            (cd "${dir}" && npm publish --access public)
          }

          publish_if_needed packages/shared
          publish_if_needed packages/core
          publish_if_needed packages/cli

      - name: Generate checksums
        run: sha256sum scripts/install.sh scripts/install.ps1 > checksums.txt

      - name: Upload GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            scripts/install.sh
            scripts/install.ps1
            checksums.txt
