name: Release CLI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Publish workspace packages
        run: |
          pnpm -C packages/shared publish --access public --no-git-checks
          pnpm -C packages/core publish --access public --no-git-checks
          pnpm -C packages/cli publish --access public --no-git-checks

      - name: Generate checksums
        run: sha256sum scripts/install.sh scripts/install.ps1 > checksums.txt

      - name: Upload GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            scripts/install.sh
            scripts/install.ps1
            checksums.txt
