name: Release Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_version:
        description: Release version to embed in the installer (for example 0.1.1)
        required: false
        type: string

permissions:
  contents: write

jobs:
  windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Stage Windows bundle
        shell: powershell
        run: .\scripts\stage-windows-bundle.ps1

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: powershell
        run: |
          $version = "${{ github.event.inputs.release_version }}"
          if (-not $version) {
            $version = "${{ github.ref_name }}".TrimStart('v')
          }
          $env:LYDIA_VERSION = $version
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "build\windows\Lydia.iss"

      - name: Upload GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/windows/out/*.exe
